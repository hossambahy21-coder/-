<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاستيللو للدهانات - كل عام وأنتم بخير</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Amiri', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* جزيئات ذهبية */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: float 5s ease-in-out infinite;
            box-shadow: 0 0 15px #ffd700;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-80px); opacity: 1; }
        }

        /* الحاوية */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 10;
        }

        /* الشعار */
        .logo-area {
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #ffd700;
            font-size: 38px;
            margin-bottom: 8px;
        }

        .company {
            font-family: 'Cairo', sans-serif;
            color: #e94560;
            font-size: 24px;
            font-weight: 900;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 5px;
        }

        /* النموذج */
        .form-area {
            background: rgba(255, 255, 255, 0.08);
            padding: 35px 28px;
            border-radius: 22px;
            margin-top: 25px;
        }

        .form-area h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 22px;
        }

        .name-input {
            width: 100%;
            padding: 18px 25px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 55px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.4s ease;
            font-family: 'Cairo', sans-serif;
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .name-input:focus {
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .send-btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            border: none;
            padding: 18px 50px;
            border-radius: 55px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.4s ease;
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.5);
            font-family: 'Cairo', sans-serif;
        }

        .send-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 45px rgba(233, 69, 96, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* التهنئة */
        .greeting-area {
            display: none;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            padding: 45px 35px;
            border-radius: 25px;
            margin-top: 22px;
            animation: showGreeting 0.8s ease;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        @keyframes showGreeting {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .greeting-area .eid-icon {
            font-size: 70px;
            margin-bottom: 10px;
        }

        .greeting-area h2 {
            font-family: 'Amiri', serif;
            color: #1a1a2e;
            font-size: 34px;
            margin-bottom: 18px;
        }

        .greeting-area p {
            font-family: 'Amiri', serif;
            color: #333;
            font-size: 20px;
            line-height: 2;
        }

        .greeting-area .person-name {
            font-family: 'Amiri', serif;
            color: #e94560;
            font-weight: bold;
            font-size: 28px;
        }

        .greeting-area .brand-name {
            font-family: 'Cairo', sans-serif;
            color: #c0392b;
            font-weight: 900;
            font-size: 24px;
        }

        .greeting-area .wish-text {
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed rgba(0,0,0,0.2);
        }

        .another-btn {
            background: #1a1a2e;
            color: #fff;
            margin-top: 22px;
        }

        .another-btn:hover {
            background: #2a2a4e;
        }

        .footer {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 25px;
            font-size: 13px;
            line-height: 1.8;
        }

        @media (max-width: 580px) {
            .container { padding: 32px 22px; }
            h1 { font-size: 28px; }
            .company { font-size: 18px; }
            .form-area { padding: 25px 20px; }
            .name-input { font-size: 17px; padding: 15px 20px; }
            .greeting-area h2 { font-size: 26px; }
            .greeting-area p { font-size: 17px; }
        }
    </style>
</head>
<body>
    <!-- جزيئات -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- العنوان -->
        <div class="logo-area">
            <div class="logo-icon">🎨</div>
            <h1>كل عام وأنتم بخير</h1>
            <p class="company">كاستيللو للدهانات</p>
            <p class="tagline">نرسم أحلامك بأجمل الألوان</p>
        </div>

        <!-- إدخال الاسم -->
        <div class="form-area" id="formArea">
            <h2>🎉 اكتب اسمك للحصول على تهنئتك 🎉</h2>
            <input type="text" class="name-input" id="nameInput" placeholder="أدخل اسمك هنا..." autocomplete="off">
            <br>
            <button type="button" class="send-btn" id="sendBtn">🎊 أرسل التهنئة</button>
        </div>

        <!-- التهنئة -->
        <div class="greeting-area" id="greetingArea">
            <div class="eid-icon">🐪</div>
            <h2 id="greetingTitle">🌙عيد الأضحى المبارك🌙</h2>
            <p>
                عزيزي <span class="person-name" id="personName"></span> 🙏<br><br>
                تتقدم لكم شركة <span class="brand-name">كاستيللو للدهانات</span><br>
                <span id="greetingText">بأطيب التمنيات بحلول عيد الأضحى المبارك 🥰</span><br><br>
                <span class="wish-text" id="wishText">🎉 كل عام وأنتم بخير وسعادة! 🎉</span>
            </p>
            <button type="button" class="send-btn another-btn" id="anotherBtn">🔄 تهنئة جديدة</button>
        </div>

        <!-- الفوتر -->
        <div class="footer">
            <p>📍 العنوان: [أدخل العنوان]</p>
            <p>📞 الهاتف: [أدخل الرقم]</p>
        </div>
    </div>

    <script>
        // ========== كثير من التهنئات ======
        var greetings = [
            "🎉 كل عام وأنتم بخير وسعادة وافر الصحة! 💪",
            "🌹 لكل年到 أنت بخير وحب وطننا في قلوبنا! ❤️",
            "🕌 تقبل الله منا ومنكم صالح الأعمال! 🤲",
            "🐪 عيدكم مبرور وكل عام وأنتم بخير! 🥰",
            "✨ أسأل الله أن يبارك عمركم ويبارك عيدكم! ⭐",
            "💖 كل عام وأنتم أحلى وأجمل! 🌸",
            "🎊 عام جديد avec beaucoup d'amour et de joie! 🇲🇦",
            "🏆，我希望大家有一个美好幸福的假期! 🇨🇳",
            "🌙 Taqabal Allah minna wa minkum! 🤍",
            "🎈 كل عام والخير بينادي والناس مبسوطين! 😊"
        ];

        var eidIcons = ["🐪", "🌙", "🕌", "☪️", "✨", "⭐", "🌟", "💫"];
        var titles = [
            "🌙عيد الأضحى المبارك🌙",
            "🎊عيد سعيد🎊",
            "🕌كل عام وأنتم بخير🕌",
            "✨عيد الأضحى كريم✨"
        ];

        var texts = [
            "بأطيب التمنيات بحلول عيد الأضحى المبارك 🥰",
            "أصدق التهاني بحلول هذا العيد السعيد 🐪",
            "نبارك لكم قدوم العيد المبارك 🏆",
            "كل عام وخير وبركة降临 💖",
            "أgean فرحة كبيرة بيوم العيد الكبير 🎉"
        ];

        // إنشاء الجزيئات
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 40; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.width = (Math.random() * 5 + 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        createParticles();

        // إظهار التهنئة
        document.getElementById('sendBtn').addEventListener('click', showGreeting);
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                showGreeting();
            }
        });

        function showGreeting() {
            var name = document.getElementById('nameInput').value.trim();
            
            if (name === "") {
                alert("من فضلك اكتب اسمك أول!");
                document.getElementById('nameInput').focus();
                return;
            }

            // إخفاء النموذج
            document.getElementById('formArea').style.display = 'none';
            
            // اختيار تهنئة عشوائية
            var randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            var randomIcon = eidIcons[Math.floor(Math.random() * eidIcons.length)];
            var randomTitle = titles[Math.floor(Math.random() * titles.length)];
            var randomText = texts[Math.floor(Math.random() * texts.length)];

            // إظهار اسم الشخص
            document.getElementById('personName').innerHTML = name;
            
            // إظهار التهنئة العشوائية
            document.getElementById('greetingTitle').innerHTML = randomTitle;
            document.getElementById('greetingText').innerHTML = randomText;
            document.getElementById('wishText').innerHTML = randomGreeting;
            document.querySelector('.greeting-area .eid-icon').innerHTML = randomIcon;
            
            // إظهار صندوق التهنئة
            document.getElementById('greetingArea').style.display = 'block';
        }

        // تهنئة جديدة
        document.getElementById('anotherBtn').addEventListener('click', function() {
            // اختيار تهنئة مختلفة
            var randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            var randomIcon = eidIcons[Math.floor(Math.random() * eidIcons.length)];
            var randomTitle = titles[Math.floor(Math.random() * titles.length)];
            var randomText = texts[Math.floor(Math.random() * texts.length)];

            document.getElementById('greetingTitle').innerHTML = randomTitle;
            document.getElementById('greetingText
