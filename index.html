<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاستيللو للدهانات - كل عام وأنتم بخير</title>
    
    <!-- الخطوط المزخرفة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;700;900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffd700;
            --red: #e94560;
            --blue: #3498db;
            --green: #2ecc71;
            --orange: #e67e22;
            --purple: #9b59b6;
            --dark: #1a1a2e;
            --white: #ffffff;
            --cream: #fef3cd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Amiri', 'Scheherazade New', 'Cairo', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ============ ألوان الدهان المتناثرة ============ */
        .paint-colors {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .paint-drop {
            position: absolute;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: dropFall 4s ease-in-out infinite;
        }

        .paint-drop:nth-child(1) { left: 5%; background: #e94560; width: 25px; height: 30px; animation-delay: 0s; }
        .paint-drop:nth-child(2) { left: 15%; background: #3498db; width: 22px; height: 26px; animation-delay: 0.5s; }
        .paint-drop:nth-child(3) { left: 25%; background: #2ecc71; width: 20px; height: 24px; animation-delay: 1s; }
        .paint-drop:nth-child(4) { left: 35%; background: #f39c12; width: 24px; height: 28px; animation-delay: 1.5s; }
        .paint-drop:nth-child(5) { left: 45%; background: #9b59b6; width: 18px; height: 22px; animation-delay: 2s; }
        .paint-drop:nth-child(6) { left: 55%; background: #e67e22; width: 22px; height: 26px; animation-delay: 0.3s; }
        .paint-drop:nth-child(7) { left: 65%; background: #1abc9c; width: 20px; height: 24px; animation-delay: 0.8s; }
        .paint-drop:nth-child(8) { left: 75%; background: #e94560; width: 25px; height: 30px; animation-delay: 1.3s; }
        .paint-drop:nth-child(9) { left: 85%; background: #3498db; width: 18px; height: 22px; animation-delay: 1.8s; }
        .paint-drop:nth-child(10) { left: 92%; background: #2ecc71; width: 22px; height: 26px; animation-delay: 2.3s; }

        @keyframes dropFall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); opacity: 0.9; }
            100% { top: 110%; transform: translateX(20px) rotate(180deg); opacity: 0.3; }
        }

        /* ============ بقع الألوان ============ */
        .color-splashes {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .splash {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(30px);
        }

        .splash:nth-child(1) { top: 10%; left: 5%; width: 200px; height: 200px; background: #e94560; }
        .splash:nth-child(2) { top: 60%; right: 10%; width: 250px; height: 250px; background: #3498db; }
        .splash:nth-child(3) { bottom: 10%; left: 20%; width: 180px; height: 180px; background: #2ecc71; }
        .splash:nth-child(4) { top: 30%; right: 30%; width: 150px; height: 150px; background: #9b59b6; }

        /* ============ الحاوية الرئيسية ============ */
        .main-container {
            background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 50px 45px;
            max-width: 620px;
            width: 100%;
            text-align: center;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1),
                        inset 0 0 80px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 10;
        }

        /* إطار مزخرف */
        .main-container::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, var(--gold), var(--red), var(--blue), var(--green)) 1;
            border-radius: 28px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* ============ الشعار ============ */
        .header-section {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            background: linear-gradient(145deg, var(--gold), #b8860b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 35px rgba(255, 215, 0, 0.4),
                        0 0 0 4px rgba(255, 215, 0, 0.2);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 10px 35px rgba(255, 215, 0, 0.4), 0 0 0 4px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 10px 45px rgba(255, 215, 0, 0.6), 0 0 0 6px rgba(255, 215, 0, 0.3); }
        }

        .title {
            font-family: 'Amiri', serif;
            font-size: 42px;
            background: linear-gradient(135deg, var(--gold), #ff6b6b, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .company-name {
            font-family: 'Cairo', sans-serif;
            color: var(--white);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-top: 8px;
            font-family: 'Scheherazade New', serif;
        }

        .decor-line {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 22px auto;
            border-radius: 50%;
        }

        /* ============ نموذج الإدخال ============ */
        .input-section {
            background: rgba(255, 255, 255, 0.08);
            padding: 38px 32px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-section h2 {
            font-family: 'Scheherazade New', serif;
            color: var(--cream);
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .name-input {
            width: 100%;
            padding: 20px 30px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 60px;
            font-size: 22px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            text-align: center;
            outline: none;
            transition: all 0.4s ease;
            font-family: 'Amiri', serif;
            letter-spacing: 1px;
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Cairo', sans-serif;
            font-size: 17px;
        }

        .name-input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.25),
                        inset 0 0 15px rgba(255, 215, 0, 0.08);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--red), #ff6b6b);
            color: var(--white);
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.4s ease;
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
            font-family: 'Cairo', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(233, 69, 96, 0.6);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* ============ صندوق التهنئة ============ */
        .greeting-section {
            display: none;
            background: linear-gradient(145deg, #fff9e6, var(--cream));
            padding: 50px 40px;
            border-radius: 28px;
            margin-top: 25px;
            animation: showGreeting 0.8s ease;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 4px var(--gold),
                        0 0 0 8px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        @keyframes showGreeting {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* أيقونات مزخرفة */
        .greeting-section::before {
            content: '🎨 🖌️ 🌈 ⭐ ✨';
            position: absolute;
            top: 12px;
            left: 0;
            width: 100%;
            font-size: 18px;
            letter-spacing: 25px;
            opacity: 0.4;
        }

        .greeting-section::after {
            content: '✨ ⭐ 🌈 🖌️ 🎨';
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            font-size: 18px;
            letter-spacing: 25px;
            opacity: 0.4;
        }

        .greeting-section .badge-icon {
            width: 85px;
            height: 85px;
            margin: 0 auto 18px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .greeting-section h2 {
            font-family: 'Amiri', serif;
            color: var(--dark);
            font-size: 38px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .greeting-section p {
            font-family: 'Scheherazade New', serif;
            color: #2c3e50;
            font-size: 22px;
            line-height: 2.4;
            position: relative;
            z-index: 1;
        }

        .greeting-section .client-name {
            font-family: 'Amiri', serif;
            color: var(--red);
            font-weight: bold;
            font-size: 32px;
            display: block;
            margin: 10px 0;
        }

        .greeting-section .brand-text {
            font-family: 'Cairo', sans-serif;
            color: #8e44ad;
            font-weight: 900;
            font-size: 26px;
            text-transform: uppercase;
        }

        .greeting-section .great-wish {
            font-family: 'Amiri', serif;
            font-size: 26px;
            font-weight: bold;
            color: var(--dark);
            margin-top: 18px;
            padding-top: 18px;
            border-top: 3px dashed rgba(0,0,0,0.15);
            display: block;
        }

        .another-btn {
            background: var(--dark);
            color: var(--white);
            margin-top: 25px;
        }

        .another-btn:hover {
            background: #2a2a4e;
        }

        /* ============ الفوتر ============ */
        .footer-info {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 28px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            line-height: 2;
        }

        /* ============ للجوال ============ */
        @media (max-width: 620px) {
            .main-container { padding: 35px 22px; }
            .title { font-size: 32px; }
            .company-name { font-size: 20px; }
            .logo-icon { width: 75px; height: 75px; font-size: 36px; }
            .input-section { padding: 28px 22px; }
            .name-input { font-size: 18px; padding: 16px 25px; }
            .submit-btn { font-size: 18px; padding: 16px 45px; }
            .greeting-section { padding: 38px 25px; }
            .greeting-section h2 { font-size: 28px; }
            .greeting-section
