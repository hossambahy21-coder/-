<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاستيللو للدهانات - كل عام وأنتم بخير</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffd700;
            --red: #e94560;
            --blue: #3498db;
            --green: #2ecc71;
            --dark: #1a1a2e;
            --white: #ffffff;
            --cream: #fef3cd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Amiri', 'Cairo', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ألوان الدهان المتناثرة */
        .paint-colors {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .paint-drop {
            position: absolute;
            top: -30px;
            border-radius: 50% 50% 50% 50%;
            animation: dropFall 5s linear infinite;
        }

        @keyframes dropFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }

        /* بقع ألوان */
        .color-splash {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
            z-index: 0;
        }

        /* الحاوية */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px 40px;
            max-width: 580px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-family: 'Amiri', serif;
            color: var(--gold);
            font-size: 38px;
            margin-bottom: 8px;
        }

        .company {
            font-family: 'Cairo', sans-serif;
            color: var(--red);
            font-size: 24px;
            font-weight: 900;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 5px;
        }

        .line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px auto;
        }

        /* النموذج */
        .form-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 35px 28px;
            border-radius: 22px;
        }

        .form-box h2 {
            color: var(--cream);
            font-size: 22px;
            margin-bottom: 22px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 55px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            text-align: center;
            outline: none;
            font-family: 'Amiri', serif;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        button {
            background: linear-gradient(135deg, var(--red), #ff6b6b);
            color: var(--white);
            border: none;
            padding: 18px 50px;
            border-radius: 55px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.5);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 45px rgba(233, 69, 96, 0.6);
        }

        /* التهنئة */
        .greeting-box {
            display: none;
            background: linear-gradient(135deg, var(--gold), #ffed4a);
            padding: 45px 35px;
            border-radius: 25px;
            margin-top: 22px;
            animation: slideIn 0.7s ease;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .greeting-box h2 {
            color: var(--dark);
            font-size: 34px;
            margin-bottom: 18px;
            font-family: 'Amiri', serif;
        }

        .greeting-box p {
            color: #333;
            font-size: 20px;
            line-height: 2.2;
            font-family: 'Amiri', serif;
        }

        .greeting-box .name {
            color: var(--red);
            font-weight: bold;
            font-size: 28px;
        }

        .greeting-box .brand {
            color: #8e44ad;
            font-weight: 900;
            font-size: 24px;
            font-family: 'Cairo', sans-serif;
        }

        .greeting-box .wish {
            font-size: 22px;
            font-weight: bold;
            color: var(--dark);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed rgba(0,0,0,0.2);
        }

        .back-btn {
            background: var(--dark);
        }

        .footer {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 25px;
            font-size: 13px;
        }

        @media (max-width: 580px) {
            .container { padding: 32px 22px; }
            h1 { font-size: 28px; }
            .company { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- ألوان الدهان -->
    <div class="paint-colors" id="paintColors"></div>
    
    <!-- بقع الألوان -->
    <div class="color-splash" style="top:10%;left:5%;width:200px;height:200px;background:#e94560;"></div>
    <div class="color-splash" style="top:60%;right:10%;width:180px;height:180px;background:#3498db;"></div>
    <div class="color-splash" style="bottom:10%;left:30%;width:150px;height:150px;background:#2ecc71;"></div>

    <div class="container">
        <div class="logo">🎨</div>
        <h1>كل عام وأنتم بخير</h1>
        <p class="company">كاستيللو للدهانات</p>
        <p class="tagline">نرسم أحلامك بأجمل الألوان</p>
        <div class="line"></div>

        <!-- إدخال الاسم -->
        <div class="form-box" id="formBox">
            <h2>
