<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاستيللو للدهانات - كل عام وأنتم بخير</title>
    
    <!-- الخط المزخرف من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* متغيرات CSS */
        :root {
            --primary-color: #e94560;
            --secondary-color: #ffd700;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Amiri', 'Tajawal', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثير النجوم */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffd700;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Lanterns */
        .lanterns {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .lantern {
            position: absolute;
            font-size: 60px;
            animation: swing 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        .lantern:nth-child(1) { top: 5%; left: 10%; animation-delay: 0s; }
        .lantern:nth-child(2) { top: 8%; right: 15%; animation-delay: 0.5s; font-size: 50px; }
        .lantern:nth-child(3) { top: 15%; left: 20%; animation-delay: 1s; font-size: 45px; }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* الحاوية الرئيسية */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 45px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* العنوان */
        .header {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 70px;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-family: 'Amiri', serif;
            color: var(--secondary-color);
            font-size: 38px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            font-weight: 700;
        }

        .company-name {
            font-family: 'Tajawal', sans-serif;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* نموذج الإدخال */
        .input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 35px 30px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-section h2 {
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: all 0.4s ease;
            text-align: center;
            font-family: 'Amiri', serif;
            font-size: 24px;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3),
                        0 10px 40px rgba(0, 0, 0, 0.2);
            transform: scale(1.02);
        }

        /* الزر */
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), #ff6b6b);
            color: #fff;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.4s ease;
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
            font-family: 'Tajawal', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 50px rgba(233, 69, 96, 0.6);
        }

        /* صندوق التهنئة */
        .greeting-section {
            display: none;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4a 50%, #ffc107 100%);
            padding: 45px 35px;
            border-radius: 30px;
            margin-top: 25px;
            animation: fadeInScale 0.8s ease;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* تأثيرات داخل التهنئة */
        .greeting-section::before {
            content: '☪';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 120px;
            opacity: 0.15;
            color: #1a1a2e;
        }

        .greeting-section::after {
            content: '☪';
            position: absolute;
            bottom: -30px;
            left: -30px;
            font-size: 100px;
            opacity: 0.15;
            color: #1a1a2e;
        }

        .greeting-section h2 {
            font-family: 'Amiri', serif;
            color: #1a1a2e;
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .greeting-section .eid-icon {
            font-size: 80px;
            margin-bottom: 15px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .greeting-section p {
            font-family: 'Amiri', serif;
            color: #333;
            font-size: 22px;
            line-height: 2.2;
            position: relative;
            z-index: 1;
        }

        .greeting-section .user-name {
            font-family: 'Amiri', serif;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 32px;
        }

        .greeting-section .company-text {
            font-family: 'Tajawal', sans-serif;
            color: #e94560;
            font-weight: 900;
            font-size: 26px;
        }

        /* زر الرجوع */
        .btn-back {
            background: #1a1a2e;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.4s ease;
            font-family: 'Tajawal', sans-serif;
            position: relative;
            z-index: 1;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* footer */
        .footer {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            line-height: 2;
        }

        .footer a {
            color: var(--secondary-color);
            text-decoration: none;
        }

        /* تأثير الأجمات عند النجاح */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            opacity: 0;
            pointer-events: none;
            animation: fall 3s linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to {
                opacity: 1;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* للشاشات الصغيرة */
        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 28px;
            }

            .company-name {
                font-size: 20px;
            }

            .logo-icon {
                font-size: 55px;
            }

            .input-section {
                padding: 25px 20px;
            }

            input[type="text"] {
                font-size: 18px;
                padding: 15px 20px;
            }

            .btn-submit {
                font-size: 18px;
                padding: 15px 45px;
            }

            .greeting-section h2 {
                font-size: 28px;
            }

            .greeting-section p {
                font-size: 18px;
            }

            .greeting-section .user-name {
                font-size: 26px;
            }

            .greeting-section .company-text {
                font-size: 22px;
            }

            .lantern {
                font-size: 40px !important;
            }
        }
    </style>
</head>
<body>
    <!-- تأثير النجوم -->
    <div class="stars" id="stars"></div>

    <!-- Lanterns -->
    <div class="lanterns">
        <div class="lantern">🏮</div>
        <div class="lantern">🏮</div>
        <div class="lantern">🏮</div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo-icon">🏮</div>
